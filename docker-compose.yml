services:
  backend:
    build: .
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      # Override MONGODB_URI to point at the local mongo service.
      # Remove this line if you want to use Atlas (set MONGODB_URI in .env instead).
      MONGODB_URI: mongodb://mongodb:27017/personal_codex
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: personal_codex
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
